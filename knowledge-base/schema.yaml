# knowledge-base/schema.yaml — Entry Frontmatter Schema
#
# This file defines the required and optional frontmatter fields for all
# entries under knowledge-base/entries/. embed.py validates against this
# schema at index time. Entries missing required fields are not indexed
# and produce a WARNING in the embed.py output.
#
# Authority: docs/knowledge-base-rag-plan.md § Entry Schema
# Status: Ratified 2026-03-14

# ---------------------------------------------------------------------------
# REQUIRED FIELDS
# Missing any of these causes embed.py to skip the entry with a WARNING.
# ---------------------------------------------------------------------------

required:
  - id
  - title
  - domain
  - sub-domain

# ---------------------------------------------------------------------------
# OPTIONAL FIELDS
# Present on most entries; absence is allowed but reduces retrieval quality.
# ---------------------------------------------------------------------------

optional:
  - applies-to
  - complexity
  - maturity
  - theorist
  - year
  - related
  - tags

# ---------------------------------------------------------------------------
# FIELD DEFINITIONS
# ---------------------------------------------------------------------------

fields:

  id:
    type: string
    format: kebab-case
    unique: true
    description: >
      Globally unique identifier. Used as the primary key in ChromaDB and
      as the value in `related:` lists. Once assigned, IDs must not change —
      changing an ID breaks all inbound `related:` references.
    examples:
      - least-privilege
      - cap-theorem
      - double-ratchet-protocol
      - normalization-1nf-bcnf

  title:
    type: string
    description: >
      Human-readable name for the entry. Should match the canonical name
      of the concept as it appears in primary sources. Used as the heading
      in Obsidian and in query.py human-readable output.
    examples:
      - "Principle of Least Privilege"
      - "CAP Theorem"
      - "Double Ratchet Protocol"
      - "Database Normalisation (1NF → BCNF)"

  domain:
    type: enum
    description: >
      Top-level knowledge domain. Must be one of the allowed values below.
      Determines the subdirectory under entries/ and enables pre-filtering
      in ChromaDB queries (e.g. --domain security).
    allowed:
      - security
      - privacy
      - architecture
      - methodology
      - coding-practices
      - database
      - distributed-systems
      - ux
      - systems-thinking
      - functional-programming
      - ml-ai
      - ethics
      - performance
      - organisation
      - documentation

  sub-domain:
    type: string
    format: free-text
    description: >
      More specific grouping within the domain. Used for human browsing
      and for finer-grained filtering. Not constrained to an enum —
      new sub-domains can be introduced without a schema change.
    examples:
      - "access control"
      - "threat modelling"
      - "relational theory"
      - "consistency models"
      - "cognitive psychology"
      - "agile practices"

  applies-to:
    type: list[enum]
    description: >
      Technology surface(s) this entry applies to. Used for pre-filtering:
      a backend-focused query can exclude UX-only entries. Use `all` when
      the principle is universal across surfaces.
    allowed:
      - backend
      - frontend
      - infrastructure
      - cloud
      - mobile
      - data
      - ml
      - all

  complexity:
    type: enum
    description: >
      Complexity to implement this concept correctly in a real system.
      Not complexity to understand — complexity to get right under
      production constraints.
    allowed:
      - low       # Straightforward to apply correctly; minimal gotchas
      - medium    # Requires care; common implementation mistakes exist
      - high      # Significant expertise required; easy to implement badly

  maturity:
    type: enum
    description: >
      Maturity of the concept in the field.
    allowed:
      - established   # Industry consensus; primary sources well-cited
      - emerging      # Growing adoption; not yet universally accepted
      - theoretical   # Research stage; limited production track record

  theorist:
    type: string
    description: >
      Primary author, originator, or researcher most associated with
      formalising the concept. Use "multiple" if there is no single
      originator. Use the person's full name on first entry; subsequent
      entries may use surname only if unambiguous.
    examples:
      - "Eric Brewer"
      - "E.F. Codd"
      - "Trevor Perrin, Moxie Marlinspike"
      - "multiple"

  year:
    type: integer
    description: >
      Year the concept was formally named, published, or presented.
      Approximate is acceptable for older concepts (e.g. Codd's relational
      model: 1970). Use the year of the primary source paper or presentation,
      not the year of widespread adoption.
    examples:
      - 1970
      - 2000
      - 2013
      - 2016

  related:
    type: list[string]
    item-format: kebab-case id (must exist in entries/)
    description: >
      IDs of related entries. Drives the graph view in Obsidian and enables
      "you might also retrieve" clustering in future query enhancements.
      References must be valid IDs — embed.py will warn on broken links.
    examples:
      - [cap-theorem, pacelc-theorem, acid-properties]
      - [least-privilege, zero-trust, defence-in-depth]

  tags:
    type: list[string]
    format: lowercase, hyphen-separated
    description: >
      Free-form tags for search and filtering. Supplement domain/sub-domain
      with cross-cutting concerns. Tags are not validated against an enum —
      new tags can be introduced freely.
    examples:
      - [cryptography, forward-secrecy, messaging]
      - [agile, estimation, planning]
      - [sql, schema-design, constraints]

# ---------------------------------------------------------------------------
# BODY TEXT CONVENTION (not enforced by schema, but required for RAG quality)
# ---------------------------------------------------------------------------
#
# The body of each entry (below the frontmatter) is what gets embedded and
# searched. A well-structured body improves retrieval quality because the
# embedding captures the semantic content of the text.
#
# Recommended structure (all sections are prose, no sub-headings required):
#
#   ## Definition
#   One to three sentences. What is this? What problem does it solve?
#
#   ## Example
#   A concrete, real-world scenario. Code snippet or architecture description
#   where appropriate. This is the most important section for grounding.
#
#   ## Strengths
#   Bullet list. What does this approach do well?
#
#   ## Weaknesses
#   Bullet list. Where does it fall short or introduce risk?
#
#   ## Mitigation
#   One to three sentences. How do practitioners address the main weaknesses?
#
# Entries that follow this structure will embed with higher semantic
# specificity and return more relevant results during retrieval.

# ---------------------------------------------------------------------------
# EXAMPLE COMPLETE ENTRY (for reference — not parsed by embed.py)
# ---------------------------------------------------------------------------
#
# ---
# id: cap-theorem
# title: "CAP Theorem"
# domain: distributed-systems
# sub-domain: consistency models
# applies-to: [backend, data, cloud]
# complexity: medium
# maturity: established
# theorist: "Eric Brewer"
# year: 2000
# related: [pacelc-theorem, acid-properties, eventual-consistency]
# tags: [distributed-systems, consistency, availability, partition-tolerance]
# ---
#
# ## Definition
# In a distributed system, it is impossible to simultaneously guarantee all
# three of: Consistency (every read returns the most recent write),
# Availability (every request receives a response), and Partition Tolerance
# (the system operates despite network partitions). Since partition tolerance
# is non-negotiable in real networks, designers must choose between C and A
# when a partition occurs.
#
# ## Example
# ...

# ---------------------------------------------------------------------------
# VALIDATION RULES (enforced by embed.py)
# ---------------------------------------------------------------------------

validation:
  on_missing_required:   warn-and-skip   # Log WARNING, do not index entry, continue
  on_invalid_enum:       warn-and-index  # Log WARNING but still index with the value
  on_broken_related_id:  warn-and-index  # Log WARNING but still index; broken link is non-fatal
  on_duplicate_id:       warn-and-skip   # Log WARNING, skip the duplicate, keep first seen

